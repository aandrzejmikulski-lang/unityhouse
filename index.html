<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Unity House – Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loaderOverlay" class="hidden">
    <div class="loader-box">
      <div class="spinner"></div>
      <p>Unity House – trwa wczytywanie…</p>
    </div>
  </div>

  <div id="app">

    <!-- KARTA LOGOWANIA -->
    <section id="loginCard">
      <h2>Logowanie</h2>
      <div id="loginMessage"></div>
      <input id="loginEmail" type="email" placeholder="E-mail" />
      <input id="loginPassword" type="password" placeholder="Hasło" />
      <button id="btnLogin">Zaloguj</button>
    </section>

    <!-- WYBÓR WSPÓLNOTY DLA USERA -->
    <section id="selectWspolnotaCard" class="hidden">
      <h2>Wybierz wspólnotę</h2>
      <select id="wspolnotaSelect"></select>
      <button id="btnSaveWspolnota">Zapisz</button>
    </section>

    <!-- PANEL USERA -->
    <section id="mainCard" class="hidden">
      <aside>
        <div class="sidebar-item active" data-target="mainCard">Zgłoszenia</div>
        <div class="sidebar-item" data-target="userAnnouncementsCard">Ogłoszenia</div>
      </aside>
      <main>
        <h2>Twoje zgłoszenia</h2>
        <div id="ticketList"></div>

        <h3>Nowe zgłoszenie</h3>
        <input id="ticketTitle" placeholder="Tytuł zgłoszenia" />
        <textarea id="ticketDesc" placeholder="Opis zgłoszenia"></textarea>
        <input id="ticketFile" type="file" />
        <button id="btnSaveTicket">Wyślij zgłoszenie</button>
      </main>
    </section>

    <!-- OGŁOSZENIA USERA -->
    <section id="userAnnouncementsCard" class="hidden">
      <h2>Ogłoszenia</h2>
      <div id="userAnnouncements"></div>
    </section>

    <!-- PANEL ADMINA -->
    <section id="adminCard" class="hidden">
      <aside>
        <div class="sidebar-item active" data-target="adminTicketsCard">Zgłoszenia</div>
        <div class="sidebar-item" data-target="adminAnnouncementsCard">Ogłoszenia</div>
        <div class="sidebar-item" data-target="adminUsersCard">Użytkownicy</div>
      </aside>
      <main>
        <!-- ZGŁOSZENIA ADMIN -->
        <section id="adminTicketsCard">
          <h2>Zgłoszenia – admin</h2>
          <label>Filtr wspólnoty:</label>
          <select id="filterWspolnota"></select>
          <div id="adminTickets"></div>
        </section>

        <!-- OGŁOSZENIA ADMIN -->
        <section id="adminAnnouncementsCard" class="hidden">
          <h2>Ogłoszenia – admin</h2>

          <h3>Nowe ogłoszenie</h3>
          <input id="announcementTitle" placeholder="Tytuł ogłoszenia" />
          <textarea id="announcementContent" placeholder="Treść ogłoszenia"></textarea>

          <label>Wybierz wspólnoty (CTRL + klik = wiele):</label>
          <select id="announcementWspolnoty" multiple></select>

          <button id="btnAddAnnouncement">Dodaj ogłoszenie</button>

          <hr />
          <h3>Lista ogłoszeń</h3>
          <div id="adminAnnouncements"></div>
        </section>

        <!-- UŻYTKOWNICY ADMIN -->
        <section id="adminUsersCard" class="hidden">
          <h2>Użytkownicy</h2>
          <h3>Oczekujący</h3>
          <div id="pendingUsersList"></div>
          <h3>Wszyscy</h3>
          <div id="allUsersList"></div>
        </section>
      </main>
    </section>

    <!-- MODAL ZGŁOSZENIA -->
    <div id="ticketModal" class="hidden">
      <div class="modal-content">
        <h3 id="modalTicketTitle"></h3>
        <p id="modalTicketDesc"></p>
        <p id="modalTicketStatus"></p>
        <div id="modalTicketFiles"></div>
        <button id="btnStatusNowe">Oznacz jako nowe</button>
        <button id="btnStatusWTrakcie">W trakcie</button>
        <button id="btnStatusZamkniete">Zamknięte</button>
        <button id="btnCloseModal">Zamknij</button>
      </div>
    </div>

  </div>

  <script>
    const loadSupabase = document.createElement("script");
    loadSupabase.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js";
    loadSupabase.onload = () => {
      console.log("✅ Supabase załadowane — inicjalizacja aplikacji...");
      const v = Date.now();
      const scripts = [
        "js/ui.js",
        "js/auth.js",
        "js/profiles.js",
        "js/tickets.js",
        "js/announcements.js",
        "js/main.js"
      ];
      scripts.forEach(src => {
        const s = document.createElement("script");
        s.src = `${src}?v=${v}&cacheBust=${Math.random()}`;
        s.defer = true;
        document.head.appendChild(s);
      });
    };
    document.head.appendChild(loadSupabase);
  </script>
</body>
</html>
