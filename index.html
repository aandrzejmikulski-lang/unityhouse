<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity House — Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar hidden">
      <div class="sidebar-glass">
        <div class="logo">UNITY HOUSE</div>
        <ul class="sidebar-nav">
          <!-- UŻYTKOWNIK -->
          <li class="sidebar-item" data-target="userAnnouncementsCard">Ogłoszenia</li>
          <li class="sidebar-item" data-target="userTicketsCard">Zgłoszenia</li>

          <!-- ADMIN -->
          <li class="sidebar-item" data-target="adminAnnouncementsCard">Ogłoszenia</li>
          <li class="sidebar-item" data-target="adminTicketsCard">Zgłoszenia</li>
          <li class="sidebar-item" data-target="adminUsersCard">Użytkownicy</li>
          <li class="sidebar-item" data-target="adminCommunitiesCard">Wspólnoty</li>
        </ul>

        <button id="btnLogout" class="btn logout-btn hidden">Wyloguj</button>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <!-- LOGIN -->
      <section id="loginCard" class="card">
        <h2>Logowanie</h2>
        <div class="field">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" placeholder="adres@domena.pl" />
        </div>
        <div class="field">
          <label for="loginPassword">Hasło</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button id="btnLogin" class="btn primary">Zaloguj</button>
        <p id="loginMessage" class="muted"></p>
      </section>

      <!-- UŻYTKOWNIK — OGŁOSZENIA -->
      <section id="userAnnouncementsCard" class="hidden user-light">
        <h2>Ogłoszenia</h2>
        <div id="user-announcements-list">
          <!-- Lista ogłoszeń -->
        </div>
      </section>

      <!-- UŻYTKOWNIK — ZGŁOSZENIA -->
      <section id="userTicketsCard" class="hidden user-light">
        <h2>Twoje zgłoszenia</h2>
        <div id="user-tickets-list">
          <!-- Lista zgłoszeń -->
        </div>
      </section>

      <!-- ADMIN — OGŁOSZENIA -->
      <section id="adminAnnouncementsCard" class="hidden user-light">
        <h2>Ogłoszenia — Administrator</h2>
        <div id="admin-announcements-form">
          <div class="field">
            <label for="announcementTitle">Tytuł ogłoszenia</label>
            <input type="text" id="announcementTitle" placeholder="Tytuł" />
          </div>
          <div class="field">
            <label for="announcementContent">Treść ogłoszenia</label>
            <textarea id="announcementContent" rows="4" placeholder="Treść ogłoszenia"></textarea>
          </div>
          <button id="btnAddAnnouncement" class="btn primary">Dodaj ogłoszenie</button>
        </div>
        <div id="admin-announcements-list">
          <!-- Lista ogłoszeń -->
        </div>
      </section>

      <!-- ADMIN — ZGŁOSZENIA -->
      <section id="adminTicketsCard" class="hidden user-light">
        <h2>Zgłoszenia mieszkańców</h2>
        <div id="admin-tickets-list">
          <!-- Lista zgłoszeń -->
        </div>
      </section>

      <!-- ADMIN — UŻYTKOWNICY -->
      <section id="adminUsersCard" class="hidden user-light">
        <h2>Użytkownicy</h2>
        <div id="admin-pending-users">
          <h3>Użytkownicy oczekujący</h3>
          <div id="pending-users-list">Brak oczekujących użytkowników.</div>
        </div>
        <div id="admin-all-users">
          <h3>Wszyscy użytkownicy</h3>
          <div id="all-users-list">
            <!-- Lista użytkowników -->
          </div>
        </div>
      </section>

      <!-- ADMIN — WSPÓLNOTY -->
      <section id="adminCommunitiesCard" class="hidden user-light">
        <h2>Wspólnoty</h2>
        <div id="admin-communities">
          <div class="field">
            <label for="communityName">Nazwa wspólnoty</label>
            <input type="text" id="communityName" placeholder="Nazwa wspólnoty" />
          </div>
          <button id="btnAddCommunity" class="btn primary">Dodaj wspólnotę</button>
          <div id="communities-list">
            <!-- Lista wspólnot -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- LOADER -->
  <div id="loaderOverlay" class="hidden">
    <div class="loader"></div>
  </div>

  <!-- MODAL -->
  <div id="ticketModal" class="modal hidden">
    <div class="modal-content">
      <button id="btnCloseModal" class="btn">Zamknij</button>
      <div id="modalBody"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/profiles.js"></script>
<script src="js/tickets.js"></script>
<script src="js/announcements.js"></script>
<script src="js/main.js"></script>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    App.ui.init();
    App.auth.init();
  });
</script>


</body>
</html>
