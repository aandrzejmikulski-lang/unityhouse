<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Unity House – Panel mieszkańca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="logo">Unity House</div>
      <nav class="topbar-nav">
        <button id="btn-show-login" class="btn ghost">Zaloguj</button>
        <button id="btn-show-signup" class="btn primary">Załóż konto</button>

        <!-- 🔥 DODANE: PRZYCISKI ADMINA (wymagane przez app.js) -->
        <button id="btn-admin-panel" class="btn ghost hidden">Panel admina</button>
        <button id="btn-admin-wspolnoty" class="btn ghost hidden">Wspólnoty</button>

        <button id="btn-logout" class="btn ghost hidden">Wyloguj</button>
      </nav>
    </header>

    <main class="layout">

      <!-- 🔥 PANEL LOGOWANIA / REJESTRACJI -->
      <section class="card auth-card" id="auth-card">
        <h1>Panel mieszkańca</h1>
        <p class="muted">
          Zgłaszaj usterki, załączaj zdjęcia, śledź status spraw – wszystko w jednym miejscu.
        </p>

        <div class="tabs">
          <button class="tab active" data-tab="login">Logowanie</button>
          <button class="tab" data-tab="signup">Rejestracja</button>
        </div>

        <div class="tab-content" id="tab-login">
          <label class="field">
            <span>Email</span>
            <input type="email" id="login-email" />
          </label>
          <label class="field">
            <span>Hasło</span>
            <input type="password" id="login-password" />
          </label>
          <button id="btn-login" class="btn primary full">Zaloguj</button>
        </div>

        <div class="tab-content hidden" id="tab-signup">
          <label class="field">
            <span>Imię i nazwisko</span>
            <input type="text" id="signup-fullname" />
          </label>
          <label class="field">
            <span>Email</span>
            <input type="email" id="signup-email" />
          </label>
          <label class="field">
            <span>Hasło</span>
            <input type="password" id="signup-password" />
          </label>
          <button id="btn-signup" class="btn primary full">Załóż konto</button>
        </div>

        <div id="auth-message" class="message hidden"></div>
      </section>

      <!-- 🔥 PANEL MIESZKAŃCA -->
      <section class="card main-card hidden" id="main-card">
        <header class="card-header">
          <div>
            <h2>Twoje zgłoszenia</h2>
            <p class="muted">Dodawaj zgłoszenia, załączaj pliki, śledź status.</p>
          </div>
          <button id="btn-new-ticket" class="btn primary">Nowe zgłoszenie</button>
        </header>

        <div id="tickets-list"></div>
      </section>

      <!-- 🔥 PANEL ADMINA -->
      <section class="card hidden" id="admin-panel">
        <h2>Panel administratora</h2>
        <div id="pending-users-list"></div>
        <div id="admin-tickets"></div>
      </section>

      <!-- 🔥 PANEL WSPÓLNOT -->
      <section class="card hidden" id="admin-wspolnoty">
        <h2>Wspólnoty</h2>
        <input type="text" id="new-wspolnota-name" placeholder="Nazwa wspólnoty" />
        <button id="btn-add-wspolnota" class="btn primary">Dodaj</button>
        <div id="wspolnoty-list"></div>
      </section>

      <!-- 🔥 WYBÓR WSPÓLNOTY -->
      <section class="card hidden" id="select-wspolnota">
        <h2>Wybierz wspólnotę</h2>
        <select id="select-wspolnota-dropdown"></select>
        <button id="btn-save-wspolnota" class="btn primary">Zapisz</button>
      </section>

      <!-- 🔥 FORMULARZ ZGŁOSZENIA -->
      <section class="card hidden" id="ticket-form">
        <h2>Nowe zgłoszenie</h2>
        <label class="field">
          <span>Tytuł</span>
          <input type="text" id="ticket-title" />
        </label>
        <label class="field">
          <span>Opis</span>
          <textarea id="ticket-description"></textarea>
        </label>
        <label class="field">
          <span>Załączniki</span>
          <input type="file" id="ticket-attachments" multiple />
        </label>
        <div id="ticket-form-message" class="message hidden"></div>
        <button id="btn-save-ticket" class="btn primary">Zapisz</button>
        <button id="btn-cancel-ticket" class="btn ghost">Anuluj</button>
      </section>

      <!-- 🔥 MODAL -->
      <div id="ticket-modal" class="modal hidden">
        <div class="modal-content">
          <button id="modal-close" class="modal-close">×</button>
          <h2 id="modal-title"></h2>
          <p id="modal-description"></p>
          <p>Status: <span id="modal-status"></span></p>
          <p>Data: <span id="modal-date"></span></p>
          <div id="modal-attachments"></div>
          <button id="modal-toggle-status" class="btn primary hidden"></button>
        </div>
      </div>

    </main>
  </div>

  <!-- 🔥 SUPABASE + APP.JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js"></script>
</body>
</html>
